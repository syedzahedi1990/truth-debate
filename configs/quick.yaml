seed: 7

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  dtype: auto
  load_in_4bit: false
  trust_remote_code: false
  max_new_tokens: 96
  temperature: 0.7
  top_p: 0.9

data:
  kind: synthetic_arithmetic
  train_size: 16
  eval_size: 12
  max_value: 25
  min_terms: 4
  max_terms: 6
  trap_fraction: 0.65

debate:
  protocols: [single, vanilla_debate, anti_conformity]
  agents: 3
  rounds: 2
  max_new_tokens: 128
  temperature: 0.8
  top_p: 0.9

reward:
  correct: 1.0
  wrong: -0.2
  parse_failure: -0.4
  escape_wrong_majority: 0.5
  join_wrong_majority: -0.4
  correct_to_wrong_flip: -0.7
  format_bonus: 0.05
  confidence_calibration: 0.1

training:
  enabled: true
  steps: 4
  batch_size: 1
  lr: 0.00005
  grad_clip: 1.0
  baseline_ema: 0.9
  save_every: 2
  lora:
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

evaluation:
  max_tasks: 12
